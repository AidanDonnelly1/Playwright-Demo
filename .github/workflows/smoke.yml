name: Smoke Tests

# Fast feedback on every push to a feature branch.
# Runs only the @smoke-tagged tests (~6 tests, ~30s).
on:
  push:
    branches-ignore: [main, master]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke (@smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache browser binaries so repeat runs skip the 100 MB download
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npx playwright test --grep @smoke
        env:
          CI: true
          DB_PATH: /tmp/smoke.db

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
