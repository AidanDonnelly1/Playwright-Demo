<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Task Manager</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav>
    <a href="/" class="brand">Task Manager</a>
    <a href="/" class="active">Dashboard</a>
    <a href="/tasks">Tasks</a>
  </nav>

  <div class="page">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-pending" style="color:#d97706">—</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-completed" style="color:#059669">—</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div>
          <h1>Quick Add</h1>
          <p>Add a task without leaving the dashboard</p>
        </div>
      </div>
      <div class="card-body">
        <div class="form-row">
          <input id="quick-input" type="text" placeholder="New task…" maxlength="200" aria-label="Quick add task" />
          <button id="quick-btn" class="btn btn-primary">Add Task</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div style="flex:1">
          <h1>Recent Tasks</h1>
          <p>Your 5 most recently added tasks</p>
        </div>
        <a href="/tasks" class="btn btn-ghost btn-sm">View all</a>
      </div>
      <div class="card-body" style="padding-top:4px">
        <div class="task-list" id="recent-list">
          <div class="empty" id="empty-state">No tasks yet.</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/js/dashboard.js"></script>
</body>
</html>
